services:
  - type: web
    name: rag-optimized
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: ANTHROPIC_API_KEY
        sync: false
    autoDeploy: true
